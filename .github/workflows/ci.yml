name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # No ANTHROPIC_API_KEY is configured — the suite must pass offline.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Offline eval: replays every scenario and diffs behaviour against the
      # committed baseline. A regression (or a stale cassette) exits non-zero.
      - run: npm run eval
